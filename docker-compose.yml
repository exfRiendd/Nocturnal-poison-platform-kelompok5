version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: smartcity-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: smartcity
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. Mosquitto MQTT Broker (IOT Layer)
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: smartcity-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./iot/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # 3. RabbitMQ (Message Broker untuk Skenario S6)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smartcity-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  # 4. PHP Environment Service (REST API sensor readings)
  php-environment:
    build: ./php-environment
    container_name: smartcity-php-environment
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8002:8002"
    volumes:
      - ./php-environment:/var/www
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: smartcity
      DB_USERNAME: root
      DB_PASSWORD: rootpass
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - mysql
      - rabbitmq

  # 5. Node-RED (IoT Data Pipeline)
  node-red:
    image: nodered/node-red:latest
    container_name: smartcity-node-red
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - ./iot/node-red:/data
    environment:
      - TZ=Asia/Jakarta
    depends_on:
      - mosquitto
      - php-environment

volumes:
  mysql_data: