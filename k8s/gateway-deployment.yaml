apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: smartcity
spec:
  selector:
    app: express-gateway
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-gateway
  namespace: smartcity
spec:
  replicas: 2
  selector:
    matchLabels:
      app: express-gateway
  template:
    metadata:
      labels:
        app: express-gateway
    spec:
      containers:
        - name: express-gateway
          image: smartcity/express-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: smartcity-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smartcity-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5