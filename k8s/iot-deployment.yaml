apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: smartcity
data:
  mosquitto.conf: |
    # Listener 
    listener 1883
    protocol mqtt

    # WebSocket listener (untuk debug via browser)
    listener 9001
    protocol websockets

    # Autentikasi 
    allow_anonymous true

    # Persistence
    persistence false

    # Logging
    log_dest stdout
    log_type error
    log_type warning
    log_type notice
    log_type information
    log_timestamp true
    log_timestamp_format %Y-%m-%dT%H:%M:%S

    # Connection Settings
    max_connections 100
    max_keepalive 60
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto-service
  namespace: smartcity
spec:
  selector:
    app: mosquitto
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
    - name: ws
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: smartcity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2.0
          ports:
            - containerPort: 1883
            - containerPort: 9001
          volumeMounts:
            - name: mosquitto-config-volume
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
      volumes:
        - name: mosquitto-config-volume
          configMap:
            name: mosquitto-config
---
apiVersion: v1
kind: Service
metadata:
  name: node-red-service
  namespace: smartcity
spec:
  selector:
    app: node-red
  ports:
    - port: 1880
      targetPort: 1880
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-red
  namespace: smartcity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-red
  template:
    metadata:
      labels:
        app: node-red
    spec:
      containers:
        - name: node-red
          image: nodered/node-red:latest
          ports:
            - containerPort: 1880
          env:
            - name: TZ
              value: "Asia/Jakarta"
          volumeMounts:
            - name: node-red-data
              mountPath: /data
      volumes:
        - name: node-red-data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-simulator
  namespace: smartcity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iot-simulator
  template:
    metadata:
      labels:
        app: iot-simulator
    spec:
      containers:
        - name: iot-simulator
          image: smartcity/iot-simulator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MQTT_HOST
              value: "mosquitto-service"
            - name: MQTT_PORT
              value: "1883"
            - name: INTERVAL_SEC
              value: "30"
